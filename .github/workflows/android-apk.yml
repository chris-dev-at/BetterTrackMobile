name: Build APK

on:
  push:
    branches: [main]
    # Owner ask (2026-07-10): only burn CI minutes when the APK can actually
    # change. Docs/markdown-only pushes (PLATFORM_ASKS, docs/, README, …) skip
    # the build entirely. Keep this list in sync with anything that feeds the
    # Gradle build.
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

# Overlapping pushes: keep only the newest run, cancel superseded ones.
concurrency:
  group: apk-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags: release notes are generated from the commit
          # messages since the previous v0.* version tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Installs cmdline-tools and exports ANDROID_HOME / ANDROID_SDK_ROOT.
      # local.properties is gitignored (absent here), so Gradle resolves the
      # SDK location from these env vars instead.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Accept all SDK licenses so AGP 9 can auto-download the components it
      # needs (platform 37 + matching build-tools). Prefetching platform-37 is
      # a best-effort speed-up; AGP downloads whatever is still missing.
      - name: Accept licenses and prefetch SDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-37" >/dev/null 2>&1 || true

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      # Stable dev signing (owner ask 2026-07-10): decode the shared keystore
      # from the repo secret so every CI APK carries the SAME signature →
      # Android's in-place "Update" works between builds. If the secret isn't
      # set, fall back silently to the old per-run debug key.
      - name: Set up stable dev signing (if configured)
        env:
          KS_B64: ${{ secrets.BT_SIGNING_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.BT_SIGNING_PASS }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/bt-dev-signing.keystore"
            {
              echo "BT_KEYSTORE=$RUNNER_TEMP/bt-dev-signing.keystore"
              echo "BT_KEYSTORE_ALIAS=btdev"
              echo "BT_KEYSTORE_PASS=$KS_PASS"
            } >> "$GITHUB_ENV"
            echo "Stable dev signing configured."
          else
            echo "BT_SIGNING_KEYSTORE_B64 secret not set — building with the runner's throwaway debug key (updates will need uninstall)."
          fi

      # Inject a CI-aware version (Step V): versionCode = monotonically-increasing
      # run_number, versionName = 0.<run_number>. Local AS builds keep 1/"dev".
      - name: Build debug APK
        run: >
          ./gradlew :app:assembleDebug
          -PbtVersionCode=${{ github.run_number }}
          -PbtVersionName=0.${{ github.run_number }}
          --no-daemon --stacktrace

      - name: Rename APK and write version.json
        run: |
          mkdir -p dist
          APK_NAME="BetterTrackApp-debug-${{ github.run_number }}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "dist/$APK_NAME"
          # Tiny manifest the app parses to detect a newer build (dev notifier).
          cat > dist/version.json <<EOF
          {"versionCode": ${{ github.run_number }}, "versionName": "0.${{ github.run_number }}", "apk": "$APK_NAME"}
          EOF
          ls -l dist
          cat dist/version.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterTrackApp-debug-${{ github.run_number }}
          path: dist/BetterTrackApp-debug-${{ github.run_number }}.apk
          if-no-files-found: error

      # Rolling prerelease on tag `latest-debug`. Delete-and-recreate guarantees
      # exactly ONE apk asset (named per run number) is current at any time.
      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APK="dist/BetterTrackApp-debug-${{ github.run_number }}.apk"
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"

          # "What's new" = every commit since the previous v0.* version tag
          # (subject bolded, body indented below). First build ever: just HEAD.
          PREV_TAG="$(git describe --tags --match 'v0.*' --abbrev=0 HEAD^ 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            WHATSNEW="$(git log --no-merges --pretty=format:'- **%s**%n%n%w(0,2,2)%b' "${PREV_TAG}..HEAD")"
          else
            WHATSNEW="$(git log -1 --no-merges --pretty=format:'- **%s**%n%n%w(0,2,2)%b' HEAD)"
          fi
          [ -n "$WHATSNEW" ] || WHATSNEW="- Maintenance build (no code-commit messages found in range)."
          printf '%s\n' "$WHATSNEW" > dist/whatsnew.md

          NOTES="$(printf '%s\n' \
            "Rolling debug build produced by CI (run #${{ github.run_number }} · version 0.${{ github.run_number }})." \
            "" \
            "Commit: ${SHORT_SHA}" \
            "Built:  ${DATE}" \
            "" \
            "## What's new in 0.${{ github.run_number }}" \
            "$WHATSNEW" \
            "" \
            "Full per-version history: see the v0.* releases below. Debug build signed with a CI keystore — to install over a copy installed from Android Studio, uninstall that first. Points at production BetterTrack.")"

          # Remove the previous release + its tag so no stale assets accumulate.
          gh release delete latest-debug --yes --cleanup-tag || true

          # Recreate the rolling prerelease at the current commit. Retry to
          # absorb the brief tag-deletion propagation window.
          ok=false
          for i in 1 2 3 4 5; do
            if gh release create latest-debug "$APK" "dist/version.json" \
                 --prerelease \
                 --title "BetterTrack App — latest debug build" \
                 --notes "$NOTES" \
                 --target "$GITHUB_SHA"; then
              ok=true
              break
            fi
            echo "release create attempt $i failed; retrying in 5s..."
            sleep 5
          done
          if [ "$ok" != "true" ]; then
            echo "Failed to publish rolling prerelease after 5 attempts." >&2
            exit 1
          fi
          echo "Published latest-debug with asset: $(basename "$APK")"

      # Permanent per-version release (owner ask 2026-07-10): every shipped
      # version keeps its APK + a real "features this version brought" text,
      # generated from the commit messages since the previous version tag.
      # The rolling `latest-debug` above stays untouched (the in-app dev
      # update-notifier parses it) — this is the browsable history.
      - name: Publish per-version release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="0.${{ github.run_number }}"
          TAG="v${VER}"
          APK="dist/BetterTrackApp-debug-${{ github.run_number }}.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          gh release create "$TAG" "$APK" \
            --prerelease \
            --title "BetterTrack App ${VER}" \
            --notes-file dist/whatsnew.md \
            --target "$GITHUB_SHA"
          echo "Published $TAG"
